services:
  - type: web
    name: bolna-server
    env: node
    plan: starter
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: VOBIZ_AUTH_ID
        sync: false
      - key: VOBIZ_AUTH_TOKEN
        sync: false
      - key: VOBIZ_FROM_NUMBER
        sync: false
      - key: VOBIZ_API_URL
        sync: false
